services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.multistage
      target: runtime
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./app.py:/app/app.py
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
